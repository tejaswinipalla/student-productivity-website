<div class="main">
  <h1>Tasks Page ✅</h1>
  <p class="subtitle">Manage your daily study tasks clearly.</p>

  <div class="box">
    <h2>Detailed To-Do List</h2>

    <div class="input-row">
      <input id="taskInput" placeholder="Enter task" onkeypress="handleTaskEnter(event)">
      <button onclick="addTask()">Add</button>
    </div>

    <ul id="taskList"></ul>
  </div>

  <div class="box graph-box">
    <h2>Weekly Task Progress</h2>
    <canvas id="taskChart"></canvas>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="script.js"></script>
