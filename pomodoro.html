<div class="main">
  <h1>Pomodoro Timer ⏱️</h1>
  <p class="subtitle">Use 25 minutes focus and 5 minutes break.</p>

  <div class="box">
    <h2>Focus Timer</h2>
    <div class="timer" id="timer">25:00</div>
    <button onclick="startTimer()">Start</button>
    <button onclick="pauseTimer()">Pause</button>
    <button onclick="resetTimer()">Reset</button>
  </div>

  <div class="box graph-box">
    <h2>Weekly Focus Sessions</h2>
    <canvas id="pomodoroChart"></canvas>
  </div>
</div>
