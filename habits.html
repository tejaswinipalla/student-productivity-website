<div class="main">
  <h1>Habit Tracker 🎯</h1>
  <p class="subtitle">Track habits like DSA, SQL, yoga, reading.</p>

  <div class="box">
    <h2>My Habits</h2>

    <div class="input-row">
      <input id="habitInput" placeholder="Enter habit" onkeypress="handleHabitEnter(event)">
      <button onclick="addHabit()">Add</button>
    </div>

    <ul id="habitList"></ul>
  </div>

  <div class="box graph-box">
    <h2>Weekly Habit Progress</h2>
    <canvas id="habitChart"></canvas>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
